name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  dco:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check all commits are signed off (DCO)
        run: |
          missing=0
          for sha in $(git log --format=%H "origin/${{ github.base_ref }}..HEAD"); do
            if ! git log -1 --format=%B "$sha" | grep -qi "^Signed-off-by:"; then
              echo "::error::Commit $sha is missing a 'Signed-off-by' trailer. Run 'git commit --amend -s' (or rebase with -s) and force-push."
              missing=1
            fi
          done
          exit $missing

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Test (pytest, coverage >= 80%)
        run: uv run pytest -v --cov=src --cov-report=term-missing --cov-fail-under=80

      - name: Run offline example smoke test
        run: uv run evalitai compare --baseline examples/offline-chatbot/baseline.jsonl --candidate examples/offline-chatbot/candidate.jsonl --judge stub --output /tmp/comparison.json

      - name: Build package
        run: uv build
