name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy src

      - name: Test (pytest, coverage >= 80%)
        run: uv run pytest -v --cov=src --cov-report=term-missing --cov-fail-under=80

      - name: Run offline example smoke test
        run: uv run evalitai compare --baseline examples/offline-chatbot/baseline.jsonl --candidate examples/offline-chatbot/candidate.jsonl --judge stub --output /tmp/comparison.json

      - name: Build package
        run: uv build
