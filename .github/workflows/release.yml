name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  test:
    uses: ./.github/workflows/ci.yml

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Verify tag matches package version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(uv run python -c 'from evalitai import __version__; print(__version__)')"
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "Tag v$tag_version does not match package version $pkg_version"
            exit 1
          fi

      - name: Pre-publish secret scan
        run: |
          if uv run python -c "import bandit" 2>/dev/null; then
            uv run bandit -r src -ll
          fi
          ! git grep -InE "(sk-[a-zA-Z0-9]{20,}|AKIA[0-9A-Z]{16})" -- . ':!uv.lock'

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
